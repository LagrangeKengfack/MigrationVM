# Live Migrator — Configuration
# /etc/live-migrator/live-migrator.conf

[thresholds]
# Température CPU maximale (°C) avant déclenchement de migration
temp_threshold = 80

# Charge CPU maximale (%) avant déclenchement
# Calculé comme : (load_average_1min / nb_cores) * 100
cpu_threshold = 90

# Utilisation RAM maximale (%) avant déclenchement
ram_threshold = 90

# Hystérésis (%) — évite le yo-yo de migrations
# La migration se déclenche si métrique > seuil + hystérésis
# La situation redevient normale si métrique < seuil
hysteresis = 5

[timing]
# Intervalle entre chaque vérification (secondes)
check_interval = 15

# Temps minimum entre deux migrations automatiques (secondes)
# Empêche les migrations en rafale
cooldown = 300

[migration]
# Type de migration : "secure" (tunnel SSH) ou "insecure" (TCP direct, plus rapide)
migration_type = secure

# Activer la compression XBZRLE pour économiser la bande passante réseau
# 0 = désactivé, 1 = activé
# Utile si réseau lent (1 Gbps). Inutile sur 10 Gbps.
enable_xbzrle = 0

# Nombre max de migrations simultanées (1 = séquentiel, recommandé)
max_parallel = 1

[orchestrator]
# Répertoire des signaux (les agents écrivent ici)
signal_dir = /var/lib/live-migrator/signals

# Placement automatique des nouvelles VMs (0 = désactivé, 1 = activé)
enable_auto_placement = 1

# Marge minimale en % entre source et cible pour autoriser une migration
# Si la cible n'est pas au moins margin_pct% moins chargée → migration refusée
margin_pct = 10

[paths]
# Fichier de log
log_file = /var/log/live-migrator.log

# Répertoire d'état du démon
state_dir = /var/lib/live-migrator
