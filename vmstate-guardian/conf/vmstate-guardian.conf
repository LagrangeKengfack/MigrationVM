# VMState Guardian Configuration
# /etc/vmstate-guardian/vmstate-guardian.conf

[general]
# VM ID to protect
vmid = 101

# Snapshot mode: "qmp" (pre-copy, minimal pause) or "qm" (full pause)
mode = qmp

# Run in foreground (true/false) — override with -f flag
foreground = false

[snapshot]
# Interval between snapshots (seconds). Min recommended: 30
snapshot_interval = 60

# Timeout for QMP pre-copy migration (seconds)
migration_timeout = 300

[monitor]
# Interval between HA status checks (seconds)
monitor_interval = 5

[restore]
# Max consecutive restore attempts before giving up
max_restore_attempts = 3

# Minimum seconds between restore attempts
restore_cooldown = 120

[paths]
# Directory for daemon state files (last_node, locks)
state_dir = /var/lib/vmstate-guardian

# Log file
log_file = /var/log/vmstate-guardian.log

# Directory for QMP state files (must be on shared storage!)
# For Ceph: use a path on the shared filesystem
vmstate_path = /var/lib/vmstate-guardian/vmstate

# QMP socket (auto-generated from vmid if empty)
# qmp_socket = /var/run/qemu-server/101.qmp
